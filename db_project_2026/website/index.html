<!DOCTYPE html>
<html>
  <head>
    <title>Celebrities</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="script.js"></script>
  </head>

  <body onload="init_customers()">
    <div>

      <!-- Header -->
      <div id="header">
        <h1>Celebrities</h1>
      </div>

      <div class="container">

        <!-- Filter panel – buttons written directly in HTML -->
        <div class="panel">
          <label>Filter by Career:</label>
          <div id="filterBtnContainer">
            <button class="btn active" onclick="filterSelection('all')">Show All</button>
            <button class="btn" onclick="filterSelection('acting')">Acting</button>
            <button class="btn" onclick="filterSelection('modeling')">Modeling</button>
            <button class="btn" onclick="filterSelection('singing')">Singing</button>
            <button class="btn" onclick="filterSelection('social-media')">Social Media</button>
          </div>
        </div>

        <!-- Cards rendered by script.js -->
        <div id="centerpanel" class="container"></div>

      </div>

      <div id="foot">
        <h3>John Crisostomo Barkas</h3>
      </div>

    </div>
  </body>
</html>
